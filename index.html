<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening IT Portfoliom</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --dark-bg: #0f172a;
            --text-light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 2rem;
            border: 1px solid #334155;
            border-radius: 15px;
            background: #1e293b;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 400px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        p {
            line-height: 1.6;
            color: #94a3b8;
        }

        .status {
            display: inline-block;
            margin-top: 1rem;
            padding: 5px 15px;
            background: #10b981;
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .btn {
            display: block;
            margin-top: 1.5rem;
            padding: 10px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Salom!</h1>
        <p>Bu mening GitHub Codespaces va Continuous Deployment orqali yaratilgan ilk veb-saytim.</p>
        <p>Hozirda Python va tizim boshqaruvi yo'nalishida o'z ustimda ishlayapman.</p>
        <div class="status">● Sayt Online</div>
        <a href="#" class="btn">Loyiha bilan tanishish</a>
    </div>

</body>
</html>
